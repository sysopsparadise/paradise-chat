]<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Paradise AI Assistant Test</title>

  <!-- n8n Chat CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: transparent;
    }

    :root {
      --chat--color--primary: #16324f;
      --chat--color--primary-shade-50: #122a42;
      --chat--color--secondary: #c9a14a;
      --chat--color-secondary-shade-50: #b8923f;
      --chat--color-dark: #16324f;
      --chat--border-radius: 12px;
      --chat--toggle--background: #16324f;
      --chat--message--user--background: #c9a14a;
      --chat--button--background--primary: #c9a14a;
      --chat--header--padding: 1.25rem 1.5rem;
      --chat--heading--font-size: 1.7em;
      --chat--subtitle--line-height: 1.4;
    }

    /*
      Hide n8n default floating button.
      We open n8n chat using our custom launcher.
    */
    .chat-window-toggle {
      opacity: 0 !important;
      pointer-events: none !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
    }

    /*
      Hide Vapi floating widget visually.
      We will trigger it automatically when user clicks "Call Ana".
    */
    vapi-widget {
      opacity: 0 !important;
      pointer-events: none !important;
      position: fixed !important;
      right: 24px !important;
      bottom: 24px !important;
      z-index: 999998 !important;
    }

    /*
      Custom Paradise launcher.
    */
    #paradise-ai-launcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 999999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #paradise-ai-main-btn,
    #paradise-ai-back-btn {
      background: #16324f;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    #paradise-ai-back-btn {
      display: none;
      background: #c9a14a;
      color: #16324f;
    }

    body.paradise-mode-selected #paradise-ai-main-btn {
      display: none;
    }

    body.paradise-mode-selected #paradise-ai-back-btn {
      display: inline-block;
    }

    #paradise-ai-menu {
      display: none;
      position: absolute;
      right: 0;
      bottom: 62px;
      width: 275px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      border: 1px solid rgba(22, 50, 79, 0.12);
    }

    #paradise-ai-menu.active {
      display: block;
    }

    .paradise-ai-header {
      background: #16324f;
      color: #ffffff;
      padding: 16px;
      text-align: center;
    }

    .paradise-ai-header img {
      width: 135px;
      margin-bottom: 8px;
    }

    .paradise-ai-header strong {
      display: block;
      font-size: 16px;
    }

    .paradise-ai-header span {
      display: block;
      font-size: 13px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .paradise-ai-option {
      width: 100%;
      border: none;
      background: #ffffff;
      padding: 16px;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid #eeeeee;
    }

    .paradise-ai-option:hover {
      background: #f7f4ec;
    }

    .paradise-ai-option strong {
      display: block;
      color: #16324f;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .paradise-ai-option span {
      color: #555555;
      font-size: 13px;
      line-height: 1.35;
    }

    /*
      n8n Chat Header Customization
    */
    .chat-header {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      text-align: center !important;
      gap: 4px;
    }

    .chat-header::before {
      content: "";
      display: block;
      width: 150px;
      height: 46px;
      margin: 0 auto 4px;
      background-image: url("https://www.paradiserealestate.es/crm/pages/agencies/paradisepro/assets/logofooter.svg");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .chat-header h1 {
      margin: 0 !important;
      line-height: 1.15 !important;
    }

    .chat-header p {
      margin: 0 !important;
      opacity: 0.9;
    }

    /*
      n8n Chat Message Avatars
    */
    .chat-message {
      position: relative !important;
      overflow: visible !important;
    }

    .chat-message-from-bot {
      margin-left: 46px;
    }

    .chat-message-from-bot::before {
      content: "";
      position: absolute;
      left: -46px;
      bottom: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #16324f;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='18'%20height='18'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='white'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M12%208V4H8'/%3E%3Crect%20width='16'%20height='12'%20x='4'%20y='8'%20rx='2'/%3E%3Cpath%20d='M2%2014h2'/%3E%3Cpath%20d='M20%2014h2'/%3E%3Cpath%20d='M15%2013v2'/%3E%3Cpath%20d='M9%2013v2'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 18px;
    }

    .chat-message-from-user {
      margin-right: 46px;
    }

    .chat-message-from-user::before {
      content: "";
      position: absolute;
      right: -46px;
      bottom: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background-color: #c9a14a;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='18'%20height='18'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='white'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M19%2021v-2a4%204%200%200%200-4-4H9a4%204%200%200%200-4%204v2'/%3E%3Ccircle%20cx='12'%20cy='7'%20r='4'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 18px;
    }

    @media (max-width: 600px) {
      #paradise-ai-launcher {
        right: 16px;
        bottom: 16px;
      }

      #paradise-ai-menu {
        width: 255px;
      }

      #paradise-ai-main-btn,
      #paradise-ai-back-btn {
        padding: 13px 17px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <!-- Vapi Voice Widget -->
  <script
    src="https://unpkg.com/@vapi-ai/client-sdk-react/dist/embed/widget.umd.js"
    async
    type="text/javascript">
  </script>

  <vapi-widget
    public-key="9585658c-2c48-4824-b6ec-aca50aac826e"
    assistant-id="9b1c1276-181f-4255-a532-d20ee1d40b88"
    mode="voice"
    theme="light"
    size="compact"
    position="bottom-right"
    main-label="Talk with Ana"
    start-button-text="Start Call with Ana"
    end-button-text="End Call"
    empty-voice-message="Ana - AI Receptionist. Ask about properties in Jávea or Dénia, pricing, or viewings."
    button-base-color="#16324f"
    button-accent-color="#ffffff"
    accent-color="#c9a14a">
  </vapi-widget>

  <!-- Custom Paradise Launcher -->
  <div id="paradise-ai-launcher">
    <div id="paradise-ai-menu">
      <div class="paradise-ai-header">
        <img src="https://www.paradiserealestate.es/crm/pages/agencies/paradisepro/assets/logofooter.svg" alt="Paradise Real Estate" />
        <strong>Ana AI Assistant</strong>
        <span>Choose how you want to speak with us</span>
      </div>

      <button class="paradise-ai-option" id="paradise-open-chat">
        <strong>💬 Chat with Ana</strong>
        <span>Ask property questions or start your enquiry by message.</span>
      </button>

      <button class="paradise-ai-option" id="paradise-open-voice">
        <strong>📞 Call Ana</strong>
        <span>Start a live voice conversation with our AI receptionist.</span>
      </button>
    </div>

    <button id="paradise-ai-main-btn">Talk to Ana</button>
    <button id="paradise-ai-back-btn">← Back to options</button>
  </div>

  <!-- n8n Chat + Logger + Launcher Logic -->
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const CHAT_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/b1f5269f-a52e-46e7-aff2-ea4103f5eae0/chat';
    const LOGGER_WEBHOOK_URL = 'https://n8n.patom.dev/webhook/website-chat-logger';

    function getConversationId() {
      let conversationId = localStorage.getItem('paradise_chat_conversation_id');

      if (conversationId && conversationId.startsWith('website_')) {
        conversationId = conversationId.replace(/^website_/, '');
        localStorage.setItem('paradise_chat_conversation_id', conversationId);
      }

      if (!conversationId) {
        conversationId = crypto.randomUUID();
        localStorage.setItem('paradise_chat_conversation_id', conversationId);
      }

      return conversationId;
    }

    async function logWebsiteChatMessage(role, message, extraData = {}) {
      const cleanMessage = String(message || '')
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!cleanMessage) return;

      try {
        await fetch(LOGGER_WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            conversation_id: getConversationId(),
            role: role,
            message: cleanMessage,
            timestamp: new Date().toISOString(),
            name: extraData.name || null,
            phone_number: extraData.phone_number || null,
            email: extraData.email || null,
            label: 'website_chatbot',
            source: window.location.href,
            user_agent: navigator.userAgent
          })
        });
      } catch (error) {
        console.error('Chat logger failed:', error);
      }
    }

    createChat({
      webhookUrl: CHAT_WEBHOOK_URL,
      mode: 'window',
      showWelcomeScreen: false,
      chatSessionKey: 'sessionId',
      chatInputKey: 'chatInput',

      metadata: {
        conversation_id: getConversationId(),
        source: window.location.href
      },

      initialMessages: [
        "Hi, I'm Ana 👋 your Costa Blanca property guide.",
        "Tell me what you're after — buy, sell, or a valuation — and I'll take it from there. Feel free to write in English, Español, Nederlands, Deutsch or Français 🌍"
      ],

      i18n: {
        en: {
          title: "Let's find your paradise",
          subtitle: "Ana's here 24/7 to find your Costa Blanca property",
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Type your message…'
        }
      }
    });

    const alreadyLoggedMessages = new Set();

    function getMessageText(messageEl) {
      const text = messageEl.innerText || messageEl.textContent || '';

      return String(text)
        .replace(/\r?\n|\r/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getMessageRole(messageEl) {
      if (messageEl.classList.contains('chat-message-from-user')) {
        return 'user';
      }

      if (messageEl.classList.contains('chat-message-from-bot')) {
        return 'bot';
      }

      return null;
    }

    function logExistingChatMessages() {
      const messageElements = document.querySelectorAll('.chat-message');

      messageElements.forEach((messageEl) => {
        const role = getMessageRole(messageEl);
        const cleanText = getMessageText(messageEl);

        if (!role || !cleanText) return;

        const isInitialMessage =
          cleanText.includes("Hi, I'm Ana") ||
          cleanText.includes("Tell me what you're after");

        if (isInitialMessage) return;

        const uniqueKey = getConversationId() + ':' + role + ':' + cleanText;

        if (alreadyLoggedMessages.has(uniqueKey)) return;

        alreadyLoggedMessages.add(uniqueKey);
        logWebsiteChatMessage(role, cleanText);
      });
    }

    function startChatMessageObserver() {
      const observer = new MutationObserver(() => {
        logExistingChatMessages();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
      });

      logExistingChatMessages();
    }

    setTimeout(startChatMessageObserver, 1200);

    function openN8nChat() {
      const selectors = [
        '.chat-window-toggle',
        '.chat-window-toggle button',
        '[aria-label="Open chat"]',
        '[aria-label="Toggle chat"]'
      ];

      for (const selector of selectors) {
        const button = document.querySelector(selector);

        if (button) {
          button.click();
          return;
        }
      }

      console.warn('n8n chat button not found yet.');
    }

    function closeN8nChatIfOpen() {
      const chatWindow =
        document.querySelector('.chat-window') ||
        document.querySelector('.chat-layout') ||
        document.querySelector('.chat-window-wrapper');

      if (!chatWindow) return;

      const selectors = [
        '[aria-label="Close chat"]',
        '[aria-label="Toggle chat"]',
        '.chat-window-toggle',
        '.chat-window-toggle button'
      ];

      for (const selector of selectors) {
        const button = document.querySelector(selector);

        if (button) {
          button.click();
          return;
        }
      }
    }

    /*
      Try to directly trigger Vapi call button.
      This works by clicking inside the Vapi widget/shadow DOM if available.
    */
    function startVapiCall() {
      const vapiWidget = document.querySelector('vapi-widget');

      if (!vapiWidget) {
        console.warn('Vapi widget not found.');
        return;
      }

      const tryClick = () => {
        const roots = [
          document,
          vapiWidget.shadowRoot
        ].filter(Boolean);

        for (const root of roots) {
          const possibleButtons = root.querySelectorAll('button, [role="button"]');

          for (const button of possibleButtons) {
            const text = (button.innerText || button.textContent || '').toLowerCase();

            if (
              text.includes('start call') ||
              text.includes('talk with ana') ||
              text.includes('call ana') ||
              text.includes('talk')
            ) {
              button.click();
              return true;
            }
          }
        }

        return false;
      };

      /*
        Try multiple times because Vapi widget loads async.
      */
      let attempts = 0;
      const interval = setInterval(() => {
        attempts += 1;

        const clicked = tryClick();

        if (clicked || attempts >= 15) {
          clearInterval(interval);
        }

        if (!clicked && attempts >= 15) {
          console.warn('Could not auto-click Vapi button. Vapi may block programmatic click.');
        }
      }, 300);
    }

    const mainBtn = document.getElementById('paradise-ai-main-btn');
    const backBtn = document.getElementById('paradise-ai-back-btn');
    const menu = document.getElementById('paradise-ai-menu');
    const chatBtn = document.getElementById('paradise-open-chat');
    const voiceBtn = document.getElementById('paradise-open-voice');

    mainBtn.addEventListener('click', function () {
      menu.classList.toggle('active');
    });

    chatBtn.addEventListener('click', function () {
      menu.classList.remove('active');

      document.body.classList.add('paradise-mode-selected');

      setTimeout(function () {
        openN8nChat();
      }, 300);
    });

    voiceBtn.addEventListener('click', function () {
      menu.classList.remove('active');

      document.body.classList.add('paradise-mode-selected');

      /*
        Directly open/start Vapi voice call.
      */
      startVapiCall();
    });

    backBtn.addEventListener('click', function () {
      document.body.classList.remove('paradise-mode-selected');

      closeN8nChatIfOpen();

      menu.classList.add('active');
    });

    document.addEventListener('click', function (event) {
      const launcher = document.getElementById('paradise-ai-launcher');

      if (!launcher.contains(event.target)) {
        menu.classList.remove('active');
      }
    });
  </script>
</body>
</html>
