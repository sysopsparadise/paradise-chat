<!-- Paradise Real Estate · Dual AI Widget -->

<!-- n8n Chat styles -->
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet"/>

<!-- Vapi Widget -->
<script src="https://unpkg.com/@vapi-ai/client-sdk-react/dist/embed/widget.umd.js" async type="text/javascript"></script>
<vapi-widget
  public-key="9585658c-2c48-4824-b6ec-aca50aac826e"
  assistant-id="9b1c1276-181f-4255-a532-d20ee1d40b88"
  mode="voice" theme="light" size="compact"
  position="bottom-right"
  main-label="Talk with Ana"
  start-button-text="Start Call with Ana"
  end-button-text="End Call"
  button-base-color="#16324f"
  button-accent-color="#c9a14a"
  accent-color="#c9a14a"
  style="display:none">
</vapi-widget>

<style>
  #pre-widget-fab{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:9999}
  #pre-widget-fab .fab-main{width:56px;height:56px;border-radius:50%;background:#16324f;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.22)}
  #pre-widget-fab .fab-main svg{transition:transform .3s}
  #pre-widget-fab .fab-main.open svg{transform:rotate(45deg)}
  #pre-widget-fab .fab-options{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  #pre-widget-fab .fab-opt{display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s;pointer-events:none}
  #pre-widget-fab .fab-options.vis .fab-opt:nth-child(1){opacity:1;transform:translateY(0);transition-delay:.05s;pointer-events:all}
  #pre-widget-fab .fab-options.vis .fab-opt:nth-child(2){opacity:1;transform:translateY(0);pointer-events:all}
  #pre-widget-fab .opt-lbl{background:#16324f;color:#fff;font-size:13px;padding:5px 12px;border-radius:20px;white-space:nowrap;font-family:system-ui,sans-serif}
  #pre-widget-fab .opt-btn{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  #pre-widget-fab .opt-btn.chat{background:#c9a14a}
  #pre-widget-fab .opt-btn.call{background:#16324f;border:2px solid #c9a14a}
  .pre-chat-panel{position:fixed;bottom:90px;right:24px;width:340px;max-height:540px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:9998;overflow:hidden;display:none;flex-direction:column}
  .pre-chat-panel.active{display:flex}
</style>

<div id="pre-widget-fab">
  <div class="fab-options" id="pwFabOpts">
    <div class="fab-opt">
      <span class="opt-lbl">Chat with Ana</span>
      <button class="opt-btn chat" id="pwOpenChat" aria-label="Open chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
    <div class="fab-opt">
      <span class="opt-lbl">Call Ana</span>
      <button class="opt-btn call" id="pwOpenCall" aria-label="Start voice call">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a14a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.6 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.12 4.18 2 2 0 0 1 5.09 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
    </div>
  </div>
  <button class="fab-main" id="pwFabMain" aria-label="Open Ana" aria-expanded="false">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="pwFabIcon"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
  </button>
</div>

<div class="pre-chat-panel" id="pwChatPanel"></div>

<script type="module">
import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

const WEBHOOK = 'https://n8n.patom.dev/webhook/b1f5269f-a52e-46e7-aff2-ea4103f5eae0/chat';
function getCid(){let c=localStorage.getItem('paradise_cid');if(!c){c=crypto.randomUUID();localStorage.setItem('paradise_cid',c);}return c;}
  const fab=document.getElementById('pwFabMain');
const opts=document.getElementById('pwFabOpts');
const icon=document.getElementById('pwFabIcon');
const btnChat=document.getElementById('pwOpenChat');
const btnCall=document.getElementById('pwOpenCall');
const chatPanel=document.getElementById('pwChatPanel');
const vapiWidget=document.querySelector('vapi-widget');
let open=false,chatLoaded=false;

fab.addEventListener('click',()=>{
  open=!open;
  opts.classList.toggle('vis',open);
  fab.classList.toggle('open',open);
  fab.setAttribute('aria-expanded',open);
  if(!open){chatPanel.classList.remove('active');if(vapiWidget)vapiWidget.style.display='none';}
});

btnChat.addEventListener('click',()=>{
  opts.classList.remove('vis');open=false;fab.classList.remove('open');
  if(vapiWidget)vapiWidget.style.display='none';
  chatPanel.classList.add('active');
  if(!chatLoaded){chatLoaded=true;
    createChat({webhookUrl:WEBHOOK,mode:'window',showWelcomeScreen:false,
      chatSessionKey:'sessionId',chatInputKey:'chatInput',
      metadata:{conversation_id:getCid(),source:window.location.href},
      initialMessages:["Hi, I'm Ana 👋 your Costa Blanca property guide.","Tell me what you're after — buy, sell, or a valuation 🌍"],
      i18n:{en:{title:"Let's find your paradise",subtitle:"Ana's here 24/7",footer:'',getStarted:'New Conversation',inputPlaceholder:'Type your message…'}}
    });
  }
});

btnCall.addEventListener('click',()=>{
  opts.classList.remove('vis');open=false;fab.classList.remove('open');
  chatPanel.classList.remove('active');
  if(vapiWidget){vapiWidget.style.display='block';vapiWidget.style.position='fixed';vapiWidget.style.bottom='90px';vapiWidget.style.right='24px';}
});
</script>
